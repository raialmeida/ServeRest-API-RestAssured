trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - "*"

schedules:
  - cron: "0 10 * * 1-5"
    displayName: "Scheduled daily"
    branches:
      include:
        - main
    always: true

variables:
  DOCKER_COMPOSE_FILE: "$(Build.SourcesDirectory)/docker-compose.yml"
  PIPELINE_USER: "$(Build.RequestedFor)"
  PIPELINE_USER_EMAIL: "$(Build.RequestedForEmail)"

pool:
  name: Teste
  demands:
    - Agent.Name -equals wsl_linux_pc

jobs:
  - job: Build
    displayName: "Build"
    steps:
      - task: DockerCompose@1
        displayName: "Build Docker Images"
        inputs:
          containerregistrytype: 'Container Registry'
          action: 'Build services'
          projectName: 'test-api-serverest'
          dockerComposeFile: '$(DOCKER_COMPOSE_FILE)'
          qualifyImageNames: false

  - job: Teste
    dependsOn: Build
    condition: succeeded('Build')
    displayName: "Execução dos testes"
    steps:
      - script: |
          HOST_UID=`id -u`
          HOST_GID=`id -g`
          echo "##vso[task.setvariable variable=HOST_UID]$HOST_UID"
          echo "##vso[task.setvariable variable=HOST_GID]$HOST_GID"
          echo "Container user: $HOST_UID:$HOST_GID"
        displayName: "Detect agent user"

      - script: |
          mkdir -p allure-results target/surefire-reports
        displayName: "Prepare test result folders"

      - task: DockerCompose@1
        displayName: "Start Containers and Run Tests"
        inputs:
          containerregistrytype: 'Container Registry'
          action: 'Run a specific service'
          dockerComposeFile: '$(DOCKER_COMPOSE_FILE)'
          serviceName: 'test-api-serverest'
          projectName: 'test-api-serverest'
          qualifyImageNames: false
          detached: false
          arguments: 'mvn test'

      - task: PublishAllureReport@1
        displayName: "Publish allure report"
        condition: always()
        inputs:
          testResultsDir: "$(Build.SourcesDirectory)/allure-results"
          allureVersion: "2.35.1"
          reportName: "Report Allure"
