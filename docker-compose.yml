services:
  test-api-serverest:
    image: test-api-serverest
    build: .
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      HOME: /tmp
      MAVEN_CONFIG: /tmp/.m2
      MAVEN_OPTS: "-Duser.home=/tmp"
      PIPELINE_USER: "${PIPELINE_USER:-local}"
      PIPELINE_USER_EMAIL: "${PIPELINE_USER_EMAIL:-unknown}"
    volumes:
      - ./allure-results:/app/target/allure-results
      - ./target/surefire-reports:/app/target/surefire-reports
